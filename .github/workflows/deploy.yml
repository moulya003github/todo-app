name: CI/CD Pipeline

on:

  push:

    branches:

      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code

        uses: actions/checkout@v3

      - name: Login to Docker Hub

        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build Docker Image

        run: docker build -t ${{ secrets.DOCKER_USER }}/todo-app .

      - name: Push Docker Image

        run: docker push ${{ secrets.DOCKER_USER }}/todo-app

      - name: Deploy to EC2

        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.EC2_HOST }}

          username: ubuntu

          key: ${{ secrets.EC2_KEY }}

          script: |

            sudo docker pull ${{ secrets.DOCKER_USER }}/todo-app

            sudo docker stop todo-final || true

            sudo docker rm todo-final || true

            sudo docker run -d -p 3001:3000 --name todo-final ${{ secrets.DOCKER_USER }}/todo-app
 
 

 
